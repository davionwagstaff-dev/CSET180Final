{% extends "base.html" %}

{% block content %}

<h2>Your Cart</h2>

{% for item in items %}
<div class="card">
    <h3>{{ item.title }}</h3>
    <p>Price: ${{ item.price }}</p>
    <p>Quantity: {{ item.quantity }}</p>
</div>
{% endfor %}

<br>

<a href="/checkout">
    <button class="btn">Checkout</button>
</a>

{% endblock %}
