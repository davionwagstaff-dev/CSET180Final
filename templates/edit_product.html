{% extends "base.html" %}

{% block content %}
<div style="max-width: 700px; margin: 40px auto; padding: 20px;">
    <div class="card" style="padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2>Edit Product</h2>
        
        <form method="POST">
            <label>Title</label>
            <input type="text" name="title" value="{{ product.title }}" required style="width: 100%; padding: 12px; margin-bottom: 20px;">

            <label>Description</label>
            <textarea name="description" rows="5" style="width: 100%; padding: 12px; margin-bottom: 20px;">{{ product.description }}</textarea>

            <label>Colors (Comma Separated)</label>
            <input type="text" name="new_colors" value="{{ curr_colors }}" style="width: 100%; padding: 12px; margin-bottom: 20px;">

            <label>Sizes (Comma Separated)</label>
            <input type="text" name="new_sizes" value="{{ curr_sizes }}" style="width: 100%; padding: 12px; margin-bottom: 20px;">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <input type="number" step="0.01" name="price" value="{{ product.price }}" placeholder="Price">
                <input type="number" name="inventory" value="{{ product.inventory }}" placeholder="Inventory">
            </div>

            <button type="submit" class="btn" style="width: 100%; background: #3498db; color: white; padding: 15px;">Update Product</button>
            
            <!-- FIXED: Matches id= requirement -->
            <a href="{{ url_for('product_page', id=product.id) }}" style="display: block; text-align: center; margin-top: 15px; color: #e74c3c; text-decoration: none;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
