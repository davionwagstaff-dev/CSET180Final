<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Master Vendor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">

<div class="auth-box" style="max-width: 450px;"> <!-- Slightly wider for more fields -->
    <h2>Create Account</h2>
    <p style="color: #64748b; margin-bottom: 2rem;">Join the marketplace today</p>

    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div style="text-align: left;">
                <label style="font-size: 0.75rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.4rem;">FULL NAME</label>
                <input name="name" placeholder="John Doe" required>
            </div>
            <div style="text-align: left;">
                <label style="font-size: 0.75rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.4rem;">USERNAME</label>
                <input name="username" placeholder="johndoe123" required>
            </div>
        </div>

        <div style="margin-bottom: 1rem; text-align: left;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.4rem;">EMAIL ADDRESS</label>
            <input name="email" type="email" placeholder="john@example.com" required>
        </div>

        <div style="margin-bottom: 1rem; text-align: left;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.4rem;">PASSWORD</label>
            <input name="password" type="password" placeholder="••••••••" required>
        </div>

        <div style="margin-bottom: 1.5rem; text-align: left;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.4rem;">I WANT TO BE A...</label>
            <select name="role">
                <option value="customer">Customer (Buyer)</option>
                <option value="vendor">Vendor (Seller)</option>
            </select>
        </div>

        <button class="btn-primary">Create Account</button>
    </form>

    <p style="text-align: center; font-size: 0.9rem; margin-top: 2rem; color: #64748b;">
        Already have an account? <a href="/login" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
    </p>
</div>

</body>
</html>
