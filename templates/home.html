{% extends "base.html" %}
{% block content %}

<div style="background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
    <form method="GET" action="/">
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <input type="text" name="search" value="{{ request.args.get('search', '') }}" placeholder="Search...">
            
            <select name="category">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if request.args.get('category') == cat.id|string %}selected{% endif %}>
                    {{ cat.name }}
                </option>
                {% endfor %}
            </select>

            <input type="number" name="min_price" value="{{ request.args.get('min_price', '') }}" placeholder="Min $">
            <input type="number" name="max_price" value="{{ request.args.get('max_price', '') }}" placeholder="Max $">

            <button type="submit" class="btn">Filter</button>
            <a href="/" class="btn" style="background:#ccc; color:black; text-decoration:none;">Reset</a>
        </div>
    </form>
</div>

<div class="grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
{% for p in products %}
    <div class="card" style="text-align: center; border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
        <img src="{{ url_for('static', filename='images/' + (p.image_url or 'default.jpg')) }}" style="width: 100%; height: 200px; object-fit: contain;">
        <h3>{{ p.title }}</h3>
        <p><strong>${{ p.price }}</strong></p>
        <a href="{{ url_for('product_page', id=p.id) }}" class="btn">View Details</a>
    </div>
{% endfor %}
</div>

{% endblock %}
