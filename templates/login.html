<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Master Vendor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-wrapper">

<div class="auth-box">
    <h2>Welcome Back</h2>
    <p style="color: #64748b; margin-bottom: 2rem;">Please enter your details</p>
    
    <form method="POST">
        <div style="margin-bottom: 1.25rem; text-align: left;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.5rem;">EMAIL OR USERNAME</label>
            <input name="login" placeholder="e.g. alex@vendor.com" required autofocus>
        </div>
        
        <div style="margin-bottom: 1.5rem; text-align: left;">
            <label style="font-size: 0.8rem; font-weight: 700; color: #475569; display: block; margin-bottom: 0.5rem;">PASSWORD</label>
            <input name="password" type="password" placeholder="••••••••" required>
        </div>
        
        <button class="btn-primary">Sign In</button>
    </form>
    
    <p style="text-align: center; font-size: 0.9rem; margin-top: 2rem; color: #64748b;">
        New here? <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a>
    </p>
</div>

</body>
</html>
